<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>ひとりごとメモ</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#F7F4ED" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ひとりごとメモ" />
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#F7F4ED;font-family:'Hiragino Sans','Yu Gothic',sans-serif;color:#2B2A28;}
body{display:flex;flex-direction:column;height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
#header{padding:14px 16px 10px;border-bottom:1px solid #E4DFD2;background:#F7F4ED;flex-shrink:0;}
#header h1{font-size:18px;font-weight:700;}
#header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
#counter{font-size:11px;color:#9CA89A;}
#filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:4px 12px;border-radius:999px;border:1px solid #E4DFD2;background:transparent;color:#6B6A66;cursor:pointer;}
.filter-btn.active{background:#FF6B4A;border-color:#FF6B4A;color:#fff;}
#scroll{flex:1;overflow-y:auto;padding:14px 12px;-webkit-overflow-scrolling:touch;}
#composer{border-top:1px solid #E4DFD2;padding:10px 12px;background:#F7F4ED;display:flex;align-items:flex-end;gap:8px;flex-shrink:0;}
#draft{flex:1;resize:none;border:1px solid #E4DFD2;border-radius:18px;padding:10px 14px;font-size:16px;font-family:inherit;background:#FFFDF9;outline:none;line-height:1.5;color:#2B2A28;max-height:140px;overflow-y:auto;}
#send-btn{width:38px;height:38px;border-radius:50%;border:none;background:#E4DFD2;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s;}
#send-btn.active{background:#FF6B4A;}
.sep{text-align:center;margin:16px 0 12px;font-size:11px;color:#B8B2A4;}
.bubble-wrap{display:flex;justify-content:flex-end;margin-bottom:8px;align-items:flex-end;gap:6px;}
.del-btn{border:none;background:none;color:#C9C3B6;cursor:pointer;font-size:13px;padding:4px;display:none;}
.bubble-wrap:hover .del-btn{display:block;}
.bubble-inner{max-width:78%;display:flex;flex-direction:column;align-items:flex-end;}
.bubble{display:flex;align-items:flex-start;gap:8px;border-radius:16px 16px 4px 16px;padding:9px 13px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.bubble.memo{background:#FFE8DD;border:1px solid #FFD7C4;}
.bubble.task{background:#FFFDF9;border:1px solid #E4DFD2;}
.bubble.task.done{background:#EDEBE3;border-color:#DAD4C5;}
.check-btn{border:none;background:none;cursor:pointer;font-size:18px;flex-shrink:0;padding:0;margin-top:1px;line-height:1;}
.bubble-text{font-size:14.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
.bubble.task.done .bubble-text{text-decoration:line-through;color:#A8A296;}
.bubble-time{font-size:10px;color:#C9C3B6;margin-top:3px;margin-right:2px;}
.tag{color:#D4825C;font-weight:500;}
#empty{text-align:center;color:#B8B2A4;font-size:13.5px;margin-top:60px;line-height:1.8;}
</style>
</head>
<body>
<div id="header">
  <div id="header-row">
    <h1>ひとりごとメモ</h1>
    <span id="counter">0/0 done</span>
  </div>
  <div id="filters">
    <button class="filter-btn active" data-f="all">すべて</button>
    <button class="filter-btn" data-f="tasks">タスク</button>
    <button class="filter-btn" data-f="done">完了済み</button>
  </div>
</div>
<div id="scroll"></div>
<div id="composer">
  <textarea id="draft" rows="1" placeholder="メモを書く… (●で始めるとタスクに)"></textarea>
  <button id="send-btn">➤</button>
</div>

<script>
const KEY = 'chatmemo:entries';
let entries = [];
let filter = 'all';

try { entries = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e) {}

function save() { localStorage.setItem(KEY, JSON.stringify(entries)); }

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts) {
  const d = new Date(ts), t = new Date(), y = new Date();
  y.setDate(t.getDate()-1);
  const sd=(a,b)=>a.toDateString()===b.toDateString();
  if(sd(d,t)) return '今日';
  if(sd(d,y)) return '昨日';
  return d.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
}
function isTask(t){ return /^●/.test(t.trim()); }
function stripMarker(t){ return t.replace(/^●\s*/,'').trim(); }
function highlightTags(t){
  return t.split(/(#[^\s#]+)/g).map(p=>
    p.startsWith('#') ? `<span class="tag">${p}</span>` : p.replace(/</g,'&lt;')
  ).join('');
}

function render() {
  const scroll = document.getElementById('scroll');
  const visible = entries.filter(e=>{
    if(filter==='tasks' && !e.isTask) return false;
    if(filter==='done' && !(e.isTask&&e.done)) return false;
    return true;
  });
  const taskTotal = entries.filter(e=>e.isTask).length;
  const doneTotal = entries.filter(e=>e.isTask&&e.done).length;
  document.getElementById('counter').textContent = doneTotal+'/'+taskTotal+' done';

  if(visible.length===0){
    scroll.innerHTML = '<div id="empty">まだ何もありません。<br>下から書き込んでみましょう。<br><span style="font-size:12px;color:#C9C3B6">「●」で始めるとタスクになります</span></div>';
    return;
  }

  let html='', lastLabel='';
  for(const e of visible){
    const label = fmtDate(e.ts);
    if(label!==lastLabel){ html+=`<div class="sep">${label}</div>`; lastLabel=label; }
    const bubbleCls = 'bubble'+(e.isTask?' task':'  memo')+(e.isTask&&e.done?' done':'');
    const checkBtn = e.isTask ? `<button class="check-btn" data-id="${e.id}">${e.done?'☑':'☐'}</button>` : '';
    html+=`<div class="bubble-wrap">
      <button class="del-btn" data-del="${e.id}">🗑</button>
      <div class="bubble-inner">
        <div class="${bubbleCls.trim()}">
          ${checkBtn}
          <span class="bubble-text">${highlightTags(e.text)}</span>
        </div>
        <span class="bubble-time">${e.isTask&&e.done?'✓ ':''}${fmtTime(e.ts)}</span>
      </div>
    </div>`;
  }
  scroll.innerHTML = html;
  scroll.scrollTop = scroll.scrollHeight;

  scroll.querySelectorAll('.check-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id;
      const e=entries.find(x=>x.id===id);
      if(e){ e.done=!e.done; save(); render(); }
    });
  });
  scroll.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      entries=entries.filter(x=>x.id!==btn.dataset.del);
      save(); render();
    });
  });
}

// filter buttons
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filter=btn.dataset.f;
  render();
});

// draft auto-grow
const draft = document.getElementById('draft');
const sendBtn = document.getElementById('send-btn');
draft.addEventListener('input',()=>{
  draft.style.height='auto';
  draft.style.height=Math.min(draft.scrollHeight,140)+'px';
  sendBtn.classList.toggle('active', draft.value.trim().length>0);
});
draft.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

function send(){
  const raw=draft.value.trim();
  if(!raw) return;
  const task=isTask(raw);
  const text=task?stripMarker(raw):raw;
  entries.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,7),text,isTask:task,done:false,ts:Date.now()});
  save();
  draft.value='';
  draft.style.height='auto';
  sendBtn.classList.remove('active');
  render();
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

render();
</script>
</body>
</html>
